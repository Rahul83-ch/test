apiVersion: v1
kind: ServiceAccount
metadata:
  name: rook-api
  namespace: rook-ceph
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rook-api-role
rules:
- apiGroups: [""]
  resources:
    - pods
    - pods/log
    - pods/exec
    - nodes
  verbs:
    - get
    - list
    - watch
    - create
    - delete

- apiGroups: ["apps"]
  resources:
    - deployments
  verbs:
    - get
    - list
    - watch
    - patch
    - update
    - delete

- apiGroups: ["batch"]
  resources:
    - jobs
  verbs:
    - get
    - list
    - create
    - delete

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rook-api-bind
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: rook-api-role
subjects:
- kind: ServiceAccount
  name: rook-api
  namespace: rook-ceph

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rook-ceph-api
  namespace: rook-ceph
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rook-ceph-api

  template:
    metadata:
      labels:
        app: rook-ceph-api
    spec:
      serviceAccountName: rook-api
      containers:
        - name: api
          image: registry-local.flextronassembly.net/q2c/rook-ceph-backend-phase2:latest
          imagePullPolicy: Always
          ports:
          - containerPort: 3000
      imagePullSecrets:
        - name: harbor-auth-main

---
apiVersion: v1
kind: Service
metadata:
  name: rook-ceph-api
  namespace: rook-ceph
spec:
  selector:
    app: rook-ceph-api
  ports:
  - port: 3000
    targetPort: 3000